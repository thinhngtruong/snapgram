services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: snapgram
      POSTGRES_USER: snapgram
      POSTGRES_PASSWORD: snapgram
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapgram -d snapgram"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  nginx-cdn:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - ./deployments/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - minio

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

volumes:
  postgres-data:
  redis-data:
  minio-data:

